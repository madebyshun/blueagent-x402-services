name: Render BlueAgent Demo Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/check-x402-uSibo

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            chromium-browser \
            ffmpeg \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1

      - name: Install node dependencies
        working-directory: demo
        run: bun install

      - name: Render MP4
        working-directory: demo
        run: |
          bunx remotion render BlueAgentDemo out/demo.mp4 \
            --browser-executable=$(which chromium-browser) \
            --log=verbose \
            --concurrency=2

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueagent-demo
          path: demo/out/demo.mp4
          retention-days: 30
