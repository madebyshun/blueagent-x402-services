name: Render BlueAgent Demo Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/check-x402-uSibo

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Install node dependencies
        working-directory: demo
        run: bun install

      - name: Render MP4
        working-directory: demo
        env:
          CHROME_PATH: /usr/bin/chromium-browser
        run: |
          bunx remotion render BlueAgentDemo out/demo.mp4 \
            --browser-executable=/usr/bin/chromium-browser \
            --log=verbose \
            --concurrency=1

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueagent-demo
          path: demo/out/demo.mp4
          retention-days: 30
