name: Deploy x402 Services

on:
  push:
    branches: [main]
    paths:
      - 'x402/**'
      - 'bankr.x402.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bankr CLI
        run: npm install -g @bankr/cli@latest

      - name: Inline _lib helpers
        run: node scripts/inline-libs.js

      - name: Deploy services (one by one for visibility)
        env:
          BANKR_API_KEY: ${{ secrets.BANKR_API_KEY }}
        run: |
          set +e
          FAILED=""
          for svc in $(node -e "const d=require('./bankr.x402.json'); console.log(Object.keys(d.services).join(' '))"); do
            echo "▶ Deploying $svc..."
            bankr x402 deploy $svc
            if [ $? -ne 0 ]; then
              echo "✗ FAILED: $svc"
              FAILED="$FAILED $svc"
            else
              echo "✓ OK: $svc"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo ""
            echo "❌ Failed services:$FAILED"
            exit 1
          fi
          echo "✅ All services deployed"
